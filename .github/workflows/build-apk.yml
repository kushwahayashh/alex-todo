name: Build APK & Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.0)"
        required: false
        default: "1.0.0"

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate signing key
        working-directory: twa
        run: |
          keytool -genkeypair \
            -keystore android.keystore \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias alextodo \
            -dname "CN=AlexTodo, O=AlexTodo, C=US" \
            -storepass android123 \
            -keypass android123

      - name: Build with Bubblewrap (Docker)
        working-directory: twa
        run: |
          docker run --rm \
            -v "$(pwd):/work" \
            -w /work \
            -e BUBBLEWRAP_KEYSTORE_PASSWORD=android123 \
            -e BUBBLEWRAP_KEY_PASSWORD=android123 \
            ghcr.io/googlechromelabs/bubblewrap:latest \
            build --skipPwaValidation --signingKeyPath="./android.keystore" --signingKeyAlias="alextodo"

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${{ inputs.version || '1.0.0' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "AlexTodo ${{ steps.version.outputs.tag }}"
          body: "APK built from PWA using Bubblewrap TWA"
          files: |
            twa/app-release-signed.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
